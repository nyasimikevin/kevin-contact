<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Contact Kevin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'DM Sans',sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:1.5rem;
  }
  .card{
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:28px;
    padding:2.5rem 2rem;
    max-width:360px;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:1.4rem;
    animation:fadeUp 0.5s ease both;
  }
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(24px);}
    to{opacity:1;transform:translateY(0);}
  }
  .avatar{
    width:84px;height:84px;border-radius:50%;
    background:linear-gradient(135deg,#25D366,#128C7E);
    display:flex;align-items:center;justify-content:center;
    font-size:32px;font-weight:600;color:#fff;
    box-shadow:0 8px 32px rgba(37,211,102,0.35);
  }
  .name{font-size:24px;font-weight:600;color:#fff;letter-spacing:-0.3px;}
  .divider{width:100%;height:1px;background:rgba(255,255,255,0.08);}
  .section-label{font-size:11px;font-weight:600;letter-spacing:1.2px;color:rgba(255,255,255,0.4);text-transform:uppercase;align-self:flex-start;}
  .buttons{display:flex;gap:12px;width:100%;}
  a{
    flex:1;padding:16px 12px;border-radius:16px;
    font-size:14px;font-weight:600;color:#fff;
    text-decoration:none;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  a:active{transform:scale(0.96);}
  .wa{background:linear-gradient(135deg,#25D366,#128C7E);box-shadow:0 4px 20px rgba(37,211,102,0.3);}
  .wa:hover{box-shadow:0 6px 28px rgba(37,211,102,0.45);}
  .call-safe{background:linear-gradient(135deg,#2193b0,#6dd5ed);box-shadow:0 4px 20px rgba(33,147,176,0.3);}
  .call-safe:hover{box-shadow:0 6px 28px rgba(33,147,176,0.45);}
  .wa-airtel{background:linear-gradient(135deg,#e52222,#c0392b);box-shadow:0 4px 20px rgba(229,34,34,0.3);}
  .wa-airtel:hover{box-shadow:0 6px 28px rgba(229,34,34,0.45);}
  .call-airtel{background:linear-gradient(135deg,#ff6b6b,#e52222);box-shadow:0 4px 20px rgba(255,107,107,0.3);}
  .call-airtel:hover{box-shadow:0 6px 28px rgba(255,107,107,0.45);}
  .btn-label{font-size:12px;font-weight:500;opacity:0.85;}
  svg{width:26px;height:26px;fill:currentColor;}
  .footer{font-size:11px;color:rgba(255,255,255,0.25);text-align:center;}
  .network-tag{font-size:10px;font-weight:600;letter-spacing:0.5px;opacity:0.7;}
</style>
</head>
<body>
